<html>
<head>
    <title>Image Gallery</title>
<style>
body{
    margin:0;
    padding:0;
    font-family:Poppins, sans-serif;
    background: linear-gradient(to right, #ff7e5f, #feb47b);
}

.title{
    text-align:center;
    color:white;
    padding:20px;
}

.gallery{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    padding:20px;
}
.box{
    width:30%;
    height:180px;
    overflow:hidden;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.3);
    transition: transform 0.4s;
}
.box img{
    width:100%;
    height:100%;
    object-fit:cover;
    transition: transform 0.4s;
}

.box:hover{
    transform: scale(1.1);
    box-shadow:0 8px 20px rgba(0,0,0,0.5);
}

.box:hover img{
    transform: scale(1.2);
}
</style>
    
</head>
